enum RunnerState {
  IDLE
  IDLE_WITH_SKIPPED_TASKS
  RUNNING
  STOPPED_AFTER_ERROR
}

enum AiProcessingStep {
  CLEANUP
  SPLIT
  TRANSLATION
  VOCABULARY
}

enum AiModelProvider {
  GEMINI
  GITHUB_MODELS
}

type RunnerTask {
  type: String!
  bookPath: String
  pagePath: String
  label: String!
}

type RunnerLastError {
  message: String!
  occurredAt: DateTime!
  task: RunnerTask
}

type RunnerStatus {
  state: RunnerState!
  runId: String
  startedAt: DateTime
  finishedAt: DateTime
  currentTask: RunnerTask
  processedTaskCount: Int!
  skippedTaskCount: Int!
  stopRequested: Boolean!
  lastError: RunnerLastError
  lastMessage: String
  exhaustedModelIds: [String!]!
}

type RunnerOperationLogParams {
  bookPath: String
  pagePath: String
  label: String!
}

type RunnerOperationLogResult {
  status: String!
  durationMs: Int!
  message: String
}

type RunnerOperationLogEntry {
  ts: DateTime!
  phase: String!
  runId: String!
  operation: String!
  model: String
  params: RunnerOperationLogParams
  result: RunnerOperationLogResult
}

type AiModel {
  provider: AiModelProvider!
  modelId: String!
  requestsPerMinute: Int!
  profiles: [AiModelProfile!]!
}

type AiModelProfile {
  name: String!
  parametersJson: String!
}

type AiProcessingStepConfig {
  step: AiProcessingStep!
  models: [AiProcessingStepModelConfig!]!
}

type AiProcessingStepModelConfig {
  provider: AiModelProvider!
  modelId: String!
  profileName: String!
}

type AiProcessingConfig {
  models: [AiModel!]!
  steps: [AiProcessingStepConfig!]!
}

input AiModelInput {
  provider: AiModelProvider!
  modelId: String!
  requestsPerMinute: Int!
  profiles: [AiModelProfileInput!]!
}

input AiModelProfileInput {
  name: String!
  parametersJson: String!
}

input AiProcessingStepConfigInput {
  step: AiProcessingStep!
  models: [AiProcessingStepModelConfigInput!]!
}

input AiProcessingStepModelConfigInput {
  provider: AiModelProvider!
  modelId: String!
  profileName: String!
}

input UpdateAiProcessingConfigInput {
  models: [AiModelInput!]!
  steps: [AiProcessingStepConfigInput!]!
}

extend type Query {
  aiProcessingConfig: AiProcessingConfig!
  runnerOperationLog(limit: Int): [RunnerOperationLogEntry!]!
  runnerStatus: RunnerStatus!
}

extend type Mutation {
  startRunner: RunnerStatus!
  requestRunnerStop: RunnerStatus!
  updateAiProcessingConfig(
    input: UpdateAiProcessingConfigInput!
  ): AiProcessingConfig!
}
